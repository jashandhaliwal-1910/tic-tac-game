<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="logo">
      <span class="logo-x">X</span>
      <span class="logo-dot">·</span>
      <span class="logo-o">O</span>
    </div>

    <!-- Mode toggle -->
    <div class="mode-switch" id="modeSwitch" title="Switch game mode">
      <span id="modeLabel">vs Human</span>
      <div class="toggle-pill" id="modeToggle">
        <div class="toggle-knob"></div>
      </div>
    </div>

    <!-- Dark / Light -->
    <button class="icon-btn" id="themeBtn" aria-label="Toggle theme">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </header>

  <!-- ── Main ── -->
  <main>

    <!-- Status -->
    <div class="status-bar">
      <div class="turn-indicator" id="turnIndicator">
        <span class="turn-symbol" id="turnSymbol">X</span>
        <span class="turn-text" id="turnText">Your turn</span>
      </div>
    </div>

    <!-- Board -->
    <div class="board" id="board" role="grid" aria-label="Tic-Tac-Toe board">
      <div class="cell" data-index="0" role="gridcell" tabindex="0" aria-label="Cell 1"></div>
      <div class="cell" data-index="1" role="gridcell" tabindex="0" aria-label="Cell 2"></div>
      <div class="cell" data-index="2" role="gridcell" tabindex="0" aria-label="Cell 3"></div>
      <div class="cell" data-index="3" role="gridcell" tabindex="0" aria-label="Cell 4"></div>
      <div class="cell" data-index="4" role="gridcell" tabindex="0" aria-label="Cell 5"></div>
      <div class="cell" data-index="5" role="gridcell" tabindex="0" aria-label="Cell 6"></div>
      <div class="cell" data-index="6" role="gridcell" tabindex="0" aria-label="Cell 7"></div>
      <div class="cell" data-index="7" role="gridcell" tabindex="0" aria-label="Cell 8"></div>
      <div class="cell" data-index="8" role="gridcell" tabindex="0" aria-label="Cell 9"></div>
    </div>

    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="score-card score-x">
        <div class="score-label">X</div>
        <div class="score-value" id="scoreX">0</div>
        <div class="score-sublabel" id="labelX">Player 1</div>
      </div>
      <div class="score-card score-draw">
        <div class="score-label">—</div>
        <div class="score-value" id="scoreDraw">0</div>
        <div class="score-sublabel">Draws</div>
      </div>
      <div class="score-card score-o">
        <div class="score-label">O</div>
        <div class="score-value" id="scoreO">0</div>
        <div class="score-sublabel" id="labelO">Player 2</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-ghost" id="restartBtn">Restart Game</button>
      <button class="btn btn-primary" id="newMatchBtn">New Match</button>
    </div>

    <!-- Stats -->
    <details class="stats-panel">
      <summary>Game Statistics</summary>
      <div class="stats-grid">
        <div class="stat"><span class="stat-val" id="statGames">0</span><span class="stat-lbl">Games</span></div>
        <div class="stat"><span class="stat-val" id="statXWin">0%</span><span class="stat-lbl">X Win%</span></div>
        <div class="stat"><span class="stat-val" id="statOWin">0%</span><span class="stat-lbl">O Win%</span></div>
        <div class="stat"><span class="stat-val" id="statDrawPct">0%</span><span class="stat-lbl">Draw%</span></div>
      </div>
    </details>

  </main>

  <!-- ── Result Modal ── -->
  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-icon" id="modalIcon"></div>
      <h2 id="modalTitle">Game Over</h2>
      <p id="modalMsg"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modalRestart">Play Again</button>
        <button class="btn btn-primary" id="modalNew">New Match</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
